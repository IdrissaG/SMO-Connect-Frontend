<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (prestataire(); as prestataireRef) {
      <div>
        <h2 data-cy="prestataireDetailsHeading"><span jhiTranslate="smoConnectFrontendApp.prestataire.detail.title">Prestataire</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ prestataireRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.prestataire.nom">Nom</span></dt>
          <dd>
            <span>{{ prestataireRef.nom }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/prestataire', prestataireRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>

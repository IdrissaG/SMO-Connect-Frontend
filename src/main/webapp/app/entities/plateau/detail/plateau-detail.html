<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (plateau(); as plateauRef) {
      <div>
        <h2 data-cy="plateauDetailsHeading"><span jhiTranslate="smoConnectFrontendApp.plateau.detail.title">Plateau</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ plateauRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.plateau.nom">Nom</span></dt>
          <dd>
            <span>{{ plateauRef.nom }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.plateau.prestataire">Prestataire</span></dt>
          <dd>
            @if (plateau()!.prestataire) {
              <div>
                <a [routerLink]="['/prestataire', plateau()!.prestataire?.id, 'view']">{{ plateauRef.prestataire?.nom }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/plateau', plateauRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>

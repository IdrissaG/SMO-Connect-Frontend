<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (application(); as applicationRef) {
      <div>
        <h2 data-cy="applicationDetailsHeading"><span jhiTranslate="smoConnectFrontendApp.application.detail.title">Application</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ applicationRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.application.nom">Nom</span></dt>
          <dd>
            <span>{{ applicationRef.nom }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/application', applicationRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>

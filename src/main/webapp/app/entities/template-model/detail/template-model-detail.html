<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (templateModel(); as templateModelRef) {
      <div>
        <h2 data-cy="templateModelDetailsHeading">
          <span jhiTranslate="smoConnectFrontendApp.templateModel.detail.title">Template Model</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ templateModelRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.templateModel.nom">Nom</span></dt>
          <dd>
            <span>{{ templateModelRef.nom }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.templateModel.fichier">Fichier</span></dt>
          <dd>
            <span>{{ templateModelRef.fichier }}</span>
          </dd>
          <dt><span jhiTranslate="smoConnectFrontendApp.templateModel.actif">Actif</span></dt>
          <dd>
            <span>{{ templateModelRef.actif }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/template-model', templateModelRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>
